<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Soporte Pumatel - Reporte de Fallas</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f0f8ff; margin: 0; padding: 0; }
        .header-publico { background: #003366; color: white; padding: 20px; text-align: center; }
        .form-container { max-width: 500px; margin: 40px auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); border-top: 5px solid #ff9900; }
        h2 { color: #003366; text-align: center; margin-top: 0; }
        p.ayuda { text-align: center; color: #666; font-size: 14px; margin-bottom: 25px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 5px; box-sizing: border-box; font-size: 14px; }
        button { background: #ff9900; color: white; border: none; padding: 15px; width: 100%; font-size: 18px; font-weight: bold; border-radius: 5px; cursor: pointer; transition: background 0.3s; }
        button:hover { background: #e68a00; }
        .footer { text-align: center; margin-top: 30px; color: #888; font-size: 12px; }
    </style>
</head>
<body>

    <div class="header-publico">
        <h1>🌐 Pumatel Internet</h1>
        <p>Centro de Ayuda al Cliente</p>
    </div>

    <div class="form-container">
        <h2>¿Tienes problemas con tu servicio?</h2>
        <p class="ayuda">Ingresa tu número de contrato o teléfono y nuestro NOC revisará tu conexión inmediatamente.</p>

        <form id="form-ticket-publico" onsubmit="enviarTicket(event)">
            <label><b>Número de Contrato (Ej. PUMA-12345) o Teléfono:</b></label>
            <input type="text" id="identificador" required placeholder="Ingresa tu ID de cliente">

            <label><b>¿Qué está fallando?</b></label>
            <select id="tipo_falla" required>
                <option value="">Selecciona una opción...</option>
                <option value="LOS Rojo">Foco rojo en el módem (LOS)</option>
                <option value="Sin Navegación">Focos en verde, pero no hay internet</option>
                <option value="Intermitencia">El internet está muy lento o se corta</option>
                <option value="Sin Telefonía">No tengo tono en mi teléfono fijo</option>
            </select>

            <label><b>Describe brevemente el problema:</b></label>
            <textarea id="descripcion" rows="4" placeholder="Ej. Hubo una tormenta y se cayó un árbol sobre los cables de mi calle..." required></textarea>

            <button type="submit">Generar Reporte de Reparación</button>
        </form>
    </div>

    <div class="footer">
        <p>© 2026 Pumatel S.A. de C.V. - Todos los derechos reservados.</p>
    </div>

    <script>
        async function enviarTicket(e) {
            e.preventDefault();
            
            // Aquí enviaríamos los datos a una API pública (ej. /api/tickets/publico)
            const id = document.getElementById('identificador').value;
            alert(`¡Recibido! Hemos generado el Ticket #9942 para el identificador ${id}.\nEl área técnica (NOC) lo revisará en los próximos 15 minutos.`);
            
            document.getElementById('form-ticket-publico').reset();
        }
    </script>

</body>
</html>

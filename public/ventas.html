<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumatel - Módulo Comercial</title>
    <style>
        /* ESTILOS GENERALES Y NAVEGACIÓN (Estándar Pumatel) */
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; margin: 0; background-color: #F4F6F8; color: #333333; font-size: 15px; }
        nav { background: #002B5C; padding: 12px 30px; display: flex; align-items: center; justify-content: space-between; border-bottom: 3px solid #D4AF37; margin-bottom: 30px; }
        .nav-buttons { display: flex; gap: 10px; align-items: center; }
        .btn-logout { background: transparent; color: #E74C3C; border: 1px solid #E74C3C; padding: 8px 16px; border-radius: 20px; cursor: pointer; font-size: 13px; font-weight: bold; }
        .btn-logout:hover { background: #E74C3C; color: #FFFFFF; }
        .btn-admin { background: #D4AF37; color: #002B5C; border: none; padding: 8px 16px; font-weight: bold; border-radius: 20px; cursor: pointer; font-size: 13px; }
        
        .contenedor { padding: 0 40px 40px 40px; max-width: 1300px; margin: auto; }
        .header-seccion { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid #D4AF37; padding-bottom: 10px; margin-bottom: 20px; }
        h1 { color: #002B5C; margin: 0; font-size: 26px; }
        
        .btn-primario { background-color: #002B5C; color: #FFFFFF; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; cursor: pointer; transition: background 0.2s; }
        .btn-primario:hover { background-color: #001A38; }

        /* TABLA */
        table { width: 100%; border-collapse: collapse; background: #FFFFFF; box-shadow: 0 1px 4px rgba(0,0,0,0.08); border-radius: 6px; overflow: hidden; }
        th, td { padding: 15px; text-align: left; border-bottom: 1px solid #E0E6ED; font-size: 14px; }
        th { background: #F8F9FA; color: #002B5C; font-weight: bold; text-transform: uppercase; font-size: 12px; }

        /* MODAL DE NUEVO CONTRATO */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 43, 92, 0.6); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-box { background: #FFFFFF; padding: 30px; border-radius: 8px; width: 100%; max-width: 750px; box-shadow: 0 5px 20px rgba(0,0,0,0.3); border-top: 5px solid #D4AF37; max-height: 90vh; overflow-y: auto;}
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 1px solid #E0E6ED; padding-bottom: 10px;}
        .modal-header h2 { color: #002B5C; margin: 0; font-size: 20px; }
        .btn-cerrar { background: none; border: none; font-size: 24px; color: #7F8C8D; cursor: pointer; }
        .btn-cerrar:hover { color: #E74C3C; }
        
        /* FORMULARIO GRID */
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .form-group { margin-bottom: 5px; }
        .form-group.full-width { grid-column: span 2; }
        .form-group label { display: block; font-weight: bold; color: #002B5C; margin-bottom: 5px; font-size: 13px; text-transform: uppercase; }
        input[type="text"], input[type="email"], select { padding: 10px; border: 1px solid #CCC; border-radius: 4px; width: 100%; box-sizing: border-box; }
        
        .seccion-titulo { grid-column: span 2; color: #D4AF37; font-weight: bold; font-size: 14px; margin-top: 15px; border-bottom: 1px dashed #CCC; padding-bottom: 5px;}
    </style>
</head>
<body>

    <nav>
        <div style="display: flex; align-items: center; gap: 20px; color: #FFFFFF; font-weight: bold; letter-spacing: 1px;">
            <img src="logo_pumatel.png" alt="Logo Pumatel" style="height: 65px; width: auto; filter: brightness(0) invert(1);">
            <div style="font-size: 20px;">PUMATEL INTRANET | MÓDULO COMERCIAL</div>
        </div>
        <div class="nav-buttons">
            <button class="btn-admin" onclick="window.location.href='admin.html'">VOLVER AL PANEL</button>
            <button class="btn-logout" onclick="window.location.href='login.html'">CERRAR SESIÓN</button>
        </div>
    </nav>

    <div class="contenedor">
        <div class="header-seccion">
            <h1>Cartera de Clientes Activos</h1>
            <button class="btn-primario" onclick="abrirModal()">+ Registrar Nuevo Contrato</button>
        </div>

        <table>
            <thead>
                <tr>
                    <th>ID Cliente</th>
                    <th>Nombre Completo</th>
                    <th>Correo Electrónico</th>
                    <th>Teléfono</th>
                    <th>Dirección de Instalación</th>
                    <th>Estado</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla">
                <tr><td colspan="6" style="text-align: center; padding: 20px;">Cargando base de datos de clientes...</td></tr>
            </tbody>
        </table>
    </div>

    <div class="modal-overlay" id="modal-venta">
        <div class="modal-box">
            <div class="modal-header">
                <h2>Generar Nuevo Contrato de Servicio</h2>
                <button class="btn-cerrar" onclick="cerrarModal()">×</button>
            </div>

            <form id="form-venta">
                <div class="form-grid">
                    
                    <div class="seccion-titulo">1. DATOS PERSONALES DEL TITULAR</div>
                    
                    <div class="form-group full-width">
                        <label>Nombre Completo</label>
                        <input type="text" id="nombre_completo" required placeholder="Nombre legal para el contrato">
                    </div>

                    <div class="form-group">
                        <label>Correo Electrónico</label>
                        <input type="email" id="email" required placeholder="cliente@ejemplo.com">
                    </div>

                    <div class="form-group">
                        <label>Teléfono de Contacto</label>
                        <input type="text" id="telefono" required placeholder="A 10 dígitos">
                    </div>

                    <div class="form-group full-width">
                        <label>Dirección de Instalación</label>
                        <input type="text" id="direccion" required placeholder="Calle, Número, Colonia, C.P.">
                    </div>

                    <div class="seccion-titulo">2. DETALLES DEL SERVICIO A CONTRATAR</div>

                    <div class="form-group">
                        <label>Plan Contratado</label>
                        <select id="plan_contratado" required>
                            <option value="">Seleccione un plan...</option>
                            <option value="Basico 50 Mbps">Plan Básico - 50 Mbps</option>
                            <option value="Familiar 100 Mbps">Plan Familiar - 100 Mbps</option>
                            <option value="Gamer 300 Mbps">Plan Gamer - 300 Mbps</option>
                            <option value="Empresarial 1 Gbps">Plan Empresarial - 1 Gbps</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label>Línea Telefónica Asignada</label>
                        <input type="text" id="linea_telefonica" placeholder="Ej. 55-XXXX-XXXX">
                    </div>

                    <div class="form-group full-width" id="contenedor-series">
                        <label>Número(s) de Serie (Equipos en Almacén)</label>
                        <div class="grupo-serie" style="display: flex; gap: 10px; margin-bottom: 8px;">
                            <input type="text" class="input-serie" required placeholder="Ej. SN-PUMA-001" style="flex: 1;">
                            <button type="button" class="btn-primario" onclick="agregarSerie()" style="background-color: #27AE60; padding: 10px 15px;">+</button>
                        </div>
                    </div>

                </div>

                <div style="text-align: right; margin-top: 25px;">
                    <button type="button" class="btn-logout" onclick="cerrarModal()" style="margin-right: 10px;">Cancelar</button>
                    <button type="submit" class="btn-primario">Procesar Alta y Asignar Equipo(s)</button>
                </div>
            </form>
        </div>
    </div>

    <script>
        window.onload = cargarClientes;

        // 1. CARGAR CLIENTES DESDE LA BASE DE DATOS
        async function cargarClientes() {
            try {
                const res = await fetch('http://localhost:3000/api/usuarios/clientes');
                const datos = await res.json();
                
                let html = '';
                datos.forEach(cli => {
                    html += `
                        <tr>
                            <td><strong>CL-${cli.id_cliente}</strong></td>
                            <td>${cli.nombre_completo}</td>
                            <td>${cli.email}</td>
                            <td>${cli.telefono}</td>
                            <td>${cli.direccion}</td>
                            <td><span style="background:#27AE60; color:white; padding:3px 8px; border-radius:10px; font-size:11px; font-weight:bold;">ACTIVO</span></td>
                        </tr>
                    `;
                });
                document.getElementById('cuerpo-tabla').innerHTML = html;
            } catch (error) {
                document.getElementById('cuerpo-tabla').innerHTML = '<tr><td colspan="6" style="color:red; text-align:center;">Error de conexión con la base de datos.</td></tr>';
            }
        }

        // 2. CONTROL DEL MODAL
        function abrirModal() {
            document.getElementById('form-venta').reset();
            
            // Limpiamos los campos extra de serie por si se abrieron antes
            const contenedor = document.getElementById('contenedor-series');
            contenedor.innerHTML = `
                <label>Número(s) de Serie (Equipos en Almacén)</label>
                <div class="grupo-serie" style="display: flex; gap: 10px; margin-bottom: 8px;">
                    <input type="text" class="input-serie" required placeholder="Ej. SN-PUMA-001" style="flex: 1;">
                    <button type="button" class="btn-primario" onclick="agregarSerie()" style="background-color: #27AE60; padding: 10px 15px;">+</button>
                </div>
            `;
            
            document.getElementById('modal-venta').style.display = 'flex';
        }

        function cerrarModal() {
            document.getElementById('modal-venta').style.display = 'none';
        }

        // FUNCIÓN PARA AGREGAR MÁS CAMPOS DE NÚMEROS DE SERIE
        function agregarSerie() {
            const contenedor = document.getElementById('contenedor-series');
            const div = document.createElement('div');
            div.className = 'grupo-serie';
            div.style = 'display: flex; gap: 10px; margin-bottom: 8px;';
            div.innerHTML = `
                <input type="text" class="input-serie" required placeholder="Ej. SN-PUMA-EXT-02" style="flex: 1;">
                <button type="button" class="btn-logout" onclick="this.parentElement.remove()" style="padding: 10px 15px;">-</button>
            `;
            contenedor.appendChild(div);
        }

        // 3. ENVIAR LA TRANSACCIÓN AL BACKEND
        document.getElementById('form-venta').addEventListener('submit', async (e) => {
            e.preventDefault(); 
            
            // Recopilamos TODOS los números de serie en un Array
            const inputsSerie = document.querySelectorAll('.input-serie');
            const arraySeries = Array.from(inputsSerie).map(input => input.value.trim()).filter(val => val !== '');
            
            const payload = {
                nombre_completo: document.getElementById('nombre_completo').value,
                email: document.getElementById('email').value,
                telefono: document.getElementById('telefono').value,
                direccion: document.getElementById('direccion').value,
                plan_contratado: document.getElementById('plan_contratado').value,
                linea_telefonica: document.getElementById('linea_telefonica').value,
                numero_serie: arraySeries // <- Aquí mandamos la lista de equipos
            };

            try {
                const res = await fetch('http://localhost:3000/api/usuarios/registro', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                const respuestaBD = await res.json();

                if(res.ok) {
                    alert('¡Venta Exitosa!\n\nSe ha generado el contrato: ' + respuestaBD.numero_usuario);
                    cerrarModal();
                    cargarClientes(); 
                } else {
                    alert('Error en la transacción:\n' + respuestaBD.mensaje);
                }
            } catch (error) {
                alert('No se pudo conectar con el servidor.');
            }
        });
    </script>
</body>
</html>

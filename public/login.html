<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pumatel - Acceso al Sistema</title>
    <style>
        /* ESTILOS GENERALES FORMALES */
        body {
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #F4F6F8;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
 
        /* LOGO EN LA ESQUINA SUPERIOR IZQUIERDA */
        .logo-esquina {
            position: absolute;
            top: 30px;
            left: 40px;
            height: 80px;
            width: auto;
        }
 
        /* TARJETA DE LOGIN */
        .login-card {
            background: #FFFFFF;
            width: 100%;
            max-width: 400px;
            padding: 50px 40px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
            border-top: 5px solid #D4AF37; /* Detalle en Oro UNAM */
            text-align: center;
        }
 
        h1 {
            color: #002B5C; /* Azul Marino UNAM */
            font-size: 24px;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
 
        p {
            color: #7F8C8D;
            font-size: 14px;
            margin-bottom: 30px;
        }
 
        /* FORMULARIO */
        .form-group {
            text-align: left;
            margin-bottom: 20px;
        }
 
        label {
            display: block;
            font-size: 13px;
            font-weight: bold;
            color: #002B5C;
            margin-bottom: 8px;
            text-transform: uppercase;
        }
 
        input {
            width: 100%;
            padding: 12px 15px;
            border: 1px solid #DDE1E6;
            border-radius: 4px;
            font-size: 15px;
            box-sizing: border-box;
            outline: none;
            transition: border-color 0.2s;
        }
 
        input:focus {
            border-color: #002B5C;
        }
 
        /* BOTÓN INSTITUCIONAL */
        .btn-login {
            width: 100%;
            background-color: #002B5C;
            color: #FFFFFF;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 4px;
            cursor: pointer;
            margin-top: 10px;
            transition: background 0.2s;
        }
 
        .btn-login:hover {
            background-color: #001A38;
        }
 
        /* PIE DE PÁGINA */
        .footer-text {
            margin-top: 25px;
            font-size: 12px;
            color: #BDC3C7;
        }
    </style>
</head>
<body>
 
    <img src="logo_pumatel.png" alt="Logo Pumatel" class="logo-esquina">
 
    <div class="login-card">
        <h1>Intranet Pumatel</h1>
        <p>Centro de Operaciones y Gestión de Red</p>
 
        <form id="loginForm">
            <div class="form-group">
                <label for="username">Nombre de Usuario</label>
                <input type="text" id="username" name="username" placeholder="Ej: gmoreno" required>
            </div>
 
            <div class="form-group">
                <label for="password">Contraseña</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required>
            </div>
 
            <button type="submit" class="btn-login">INGRESAR AL SISTEMA</button>
        </form>
 
        <div class="footer-text">
            © 2026 Pumatel Telecomunicaciones. <br> Acceso restringido a personal autorizado.
        </div>
    </div>
 
    <script>
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
 
            try {
                const respuesta = await fetch('http://localhost:3000/api/auth/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
 
                const resultado = await respuesta.json();
 
                if (respuesta.ok) {
                    // GUARDAR DATOS DE SESIÓN (PERSISTENCIA)
                    localStorage.setItem('idRol', resultado.usuario.id_rol);
                    localStorage.setItem('nombreEmpleado', resultado.usuario.nombre_completo);
                    localStorage.setItem('idEmpleado', resultado.usuario.id_empleado);
 
                    // REDIRECCIÓN SEGÚN ROL
                    const rol = resultado.usuario.id_rol;
                    
                    switch(rol) {
                        case 3: // Administrador Global
                            window.location.href = 'admin.html';
                            break;
                        case 4: // Ventas
                            window.location.href = 'ventas.html';
                            break;
                        case 2: // Técnico NOC
                            window.location.href = 'noc.html';
                            break;
                        case 6: // Jefe NOC Admin
                            window.location.href = 'noc_admin.html';
                            break;
                        case 5: // Almacén
                            window.location.href = 'almacen.html';
                            break;
                        default:
                            alert('Rol no reconocido. Contacte a soporte.');
                    }
                } else {
                    alert(resultado.mensaje || 'Error de autenticación');
                }
            } catch (error) {
                console.error('Error:', error);
                alert('No se pudo conectar con el servidor.');
            }
        });
    </script>
</body>
</html>
